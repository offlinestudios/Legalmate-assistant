# Nixpacks configuration for LegalMate

# This configuration instructs Railway's Nixpacks builder how to handle
# a mixed Python/Node.js project. It installs the necessary system
# dependencies (nodejs and pnpm), installs Python and Node
# dependencies, builds the React front‑end, copies the compiled
# front‑end into the Flask static directory, and finally starts
# the Flask server.

providers = ["python", "node"]

[phases.setup]
# No additional system packages are required here. Nixpacks will
# automatically provide Node.js and npm when the "node" provider is
# present. We deliberately avoid installing nodejs via nixPkgs to
# prevent conflicts between multiple Node.js installations (which
# caused prior build failures). If you wish to use pnpm instead of
# npm, install it here with nixPkgs = ["pnpm"].
# nixPkgs = ["pnpm"]

[phases.install]
# Install Python dependencies and front‑end dependencies. We use npm
# instead of pnpm to avoid conflicts with node/corepack in the Nix
# environment. The `--prefix` flag scopes the install into the
# frontend folder so it doesn't affect the repository root.
commands = [
  "pip install -r backend/requirements.txt",
  "npm install --prefix frontend"
]

[phases.build]
# Build the React application and copy the output into the Flask
# static directory. Removing the existing static files ensures
# outdated assets are not served. We use npm here instead of pnpm.
commands = [
  "npm run build --prefix frontend",
  "rm -rf backend/src/static/*",
  "cp -r frontend/dist/* backend/src/static"
]

[start]
# Start the Flask application. This runs when the container is ready
# to serve traffic.
cmd = "python backend/src/main.py"